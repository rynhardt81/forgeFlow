name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # no `cache: pip` — it hard-requires requirements.txt/pyproject.toml
          # at repo root, which this repo intentionally lacks (the pyproject
          # here is a consumer template). The 4-package install below is
          # faster than the cache restore anyway.

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock pyyaml

      - name: Run tests
        run: python -m pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (error severity)
        run: |
          files=$(git ls-files '*.sh')
          echo "$files" | xargs shellcheck --severity=error
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: ruff
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.6"
          ruff check .
