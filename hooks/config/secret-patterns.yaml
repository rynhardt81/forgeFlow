# Secret detection patterns for Claude Forge security validators.
# Validators are informational — they emit warnings, never block operations.

secret_patterns:
  - name: "OpenAI API key"
    pattern: 'sk-[a-zA-Z0-9]{32,}'
    severity: critical

  - name: "Anthropic API key"
    pattern: 'sk-ant-[a-zA-Z0-9_-]{32,}'
    severity: critical

  - name: "AWS access key ID"
    pattern: 'AKIA[0-9A-Z]{16}'
    severity: critical

  - name: "AWS secret access key"
    pattern: '(?i)aws(.{0,20})?(secret|key)(.{0,20})?[''"=:\s]+([a-zA-Z0-9/+=]{40})'
    severity: critical

  - name: "GitHub personal access token"
    pattern: 'ghp_[a-zA-Z0-9]{36,}'
    severity: critical

  - name: "GitHub fine-grained token"
    pattern: 'github_pat_[a-zA-Z0-9_]{82,}'
    severity: critical

  - name: "Slack bot token"
    pattern: 'xox[baprs]-[a-zA-Z0-9-]{10,}'
    severity: high

  - name: "Stripe secret key"
    pattern: 'sk_live_[a-zA-Z0-9]{24,}'
    severity: critical

  - name: "Generic high-entropy string"
    pattern: '(?i)(api[_-]?key|secret|token|password)(.{0,10})?[''"=:\s]+([a-zA-Z0-9/_+=-]{32,})'
    severity: medium

  - name: "Private key block"
    pattern: '-----BEGIN ((RSA|DSA|EC|OPENSSH|PGP) )?PRIVATE KEY( BLOCK)?-----'
    severity: critical

# Files allowed to contain example/placeholder secrets without warning.
allowed_file_patterns:
  - '.env.example'
  - '.env.sample'
  - '.env.template'
  - 'examples/'
  - 'fixtures/'
  - 'tests/'
  - '**/*.test.*'
  - '**/*.spec.*'

# Extensions the secret scanner inspects. Anything else is skipped.
scan_extensions:
  - '.py'
  - '.js'
  - '.ts'
  - '.tsx'
  - '.jsx'
  - '.json'
  - '.yaml'
  - '.yml'
  - '.toml'
  - '.env'
  - '.sh'
  - '.bash'
  - '.zsh'
  - '.go'
  - '.rs'
  - '.rb'
  - '.java'
  - '.kt'
  - '.swift'
  - '.cs'
