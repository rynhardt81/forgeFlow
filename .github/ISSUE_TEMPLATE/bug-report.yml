name: Bug Report
description: Report a bug in Forge Flow framework code
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: "1. ...\n2. ...\n3. ..."
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Claude Code version, forgeFlow commit or tag
      placeholder: "macOS 15, Python 3.12, Claude Code 1.x, forgeFlow @ main"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      render: shell
